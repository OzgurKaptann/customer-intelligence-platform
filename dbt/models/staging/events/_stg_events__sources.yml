version: 2

sources:
  - name: events
    description: >
      Raw Zone Events domain — append-only synthetic clickstream events landed by
      the ingestion layer. Consumed only by the Events staging model.
    database: "{{ env_var('CIP_DB_NAME', 'cip') }}"
    schema: raw
    loaded_at_field: _ingested_at
    freshness:
      warn_after: {count: 1, period: day}
      error_after: {count: 2, period: day}
    tables:
      - name: events
        description: >
          Raw synthetic clickstream events, one row per interaction. May contain
          duplicate event_id values across re-runs; the staging layer deduplicates
          by latest _ingested_at.
        columns:
          - name: event_id
            description: Unique event identifier (UUID). Primary key of the Events domain.
          - name: session_id
            description: Session grouping key linking related events.
          - name: customer_id
            description: Customer that generated the event. Foreign key to raw.customers.
          - name: event_type
            description: Interaction type, e.g. page_view, click, session_start.
          - name: page_url
            description: URL associated with the event.
          - name: device_type
            description: Device category, e.g. desktop, mobile, tablet.
          - name: occurred_at
            description: UTC timestamp (TIMESTAMPTZ) at which the event occurred.
          - name: _ingested_at
            description: Timestamp (TIMESTAMPTZ) at which the row landed in the Raw Zone.
          - name: _run_date
            description: Pipeline run date partition key (DATE) assigned at ingestion.
