version: 2

sources:
  - name: orders
    description: >
      Raw Zone Orders domain — append-only synthetic e-commerce orders and their
      line items landed by the ingestion layer. Consumed only by the Orders
      staging models.
    database: "{{ env_var('CIP_DB_NAME', 'cip') }}"
    schema: raw
    loaded_at_field: _ingested_at
    freshness:
      warn_after: {count: 1, period: day}
      error_after: {count: 2, period: day}
    tables:
      - name: orders
        description: >
          Raw synthetic order headers, one row per order. May contain duplicate
          order_id values across re-runs; the staging layer deduplicates by latest
          _ingested_at.
        columns:
          - name: order_id
            description: Unique order identifier (UUID). Primary key of the Orders domain.
          - name: customer_id
            description: Customer that placed the order. Foreign key to raw.customers.
          - name: order_status
            description: >
              Order lifecycle status — one of completed, pending, cancelled, refunded.
          - name: total_amount_usd
            description: Total order amount in USD (NUMERIC(12,2)).
          - name: ordered_at
            description: UTC timestamp (TIMESTAMPTZ) at which the order was placed.
          - name: _ingested_at
            description: Timestamp (TIMESTAMPTZ) at which the row landed in the Raw Zone.
          - name: _run_date
            description: Pipeline run date partition key (DATE) assigned at ingestion.
      - name: order_items
        description: >
          Raw synthetic order line items, one row per item. order_item_id is unique
          at source, so no deduplication is applied downstream.
        columns:
          - name: order_item_id
            description: Unique line item identifier (UUID). Primary key.
          - name: order_id
            description: Parent order. Foreign key to raw.orders.
          - name: product_id
            description: Identifier of the purchased product.
          - name: quantity
            description: Number of units purchased (positive integer).
          - name: unit_price_usd
            description: Unit price in USD (NUMERIC(10,2), non-negative).
          - name: _ingested_at
            description: Timestamp (TIMESTAMPTZ) at which the row landed in the Raw Zone.
          - name: _run_date
            description: Pipeline run date partition key (DATE) assigned at ingestion.
