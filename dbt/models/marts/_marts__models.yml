version: 2

sources:
  # ml.ml_scores is not a dbt model — it is the ML pipeline's write target,
  # populated by ml/scoring/score_all.py + the ml_scores_promotion step. It is
  # declared here as a source so mart_ml_scores can ref it via source().
  - name: ml
    description: >
      ML scoring outputs written by the ML pipeline before promotion into the
      marts layer. Read by mart_ml_scores.
    database: "{{ env_var('CIP_DB_NAME', 'cip') }}"
    schema: ml
    tables:
      - name: ml_scores
        description: >
          One row per customer per score_date, carrying the LTV, churn,
          segmentation, and anomaly scores plus the MLflow model_run_id used to
          produce them. mart_ml_scores promotes the current run date's partition
          from this table into the marts layer.
        columns:
          - name: customer_id
            description: Customer identifier (UUID). Part of the composite primary key.
          - name: score_date
            description: Run date the scores were produced for. Part of the composite primary key.
          - name: model_run_id
            description: MLflow run ID of the models that produced the row, for traceability.
          - name: ltv_score
            description: Predicted 12-month LTV in USD (NUMERIC(12,2)); non-negative.
          - name: churn_score
            description: Churn probability in [0.0, 1.0] (NUMERIC(5,4)).
          - name: churn_risk_tier
            description: Churn tier derived from churn_score — one of Low, Medium, High.
          - name: segment_label
            description: Segmentation cluster label (e.g. Champions, Inactive).
          - name: anomaly_flag
            description: Boolean anomaly indicator set by the Anomaly_Model.
          - name: anomaly_detail
            description: JSONB anomaly detail {metric, observed, expected_range, severity}; NULL when no anomaly.
          - name: scored_at
            description: Timestamp (TIMESTAMPTZ) at which the ML pipeline wrote the row.

models:
  - name: mart_customers
    description: >
      Business-facing customer dimension. One row per customer combining enriched
      CRM attributes with trailing-window order and event activity. Exposes
      is_active, the primary flag used by dashboards and downstream ML features to
      distinguish engaged customers from dormant ones.
    tests:
      # Recency guard: the mart must carry the current run date's partition.
      # severity warn so a stale mart surfaces without halting the pipeline.
      - dbt_utils.recency:
          datepart: day
          field: _run_date
          interval: 1
          config:
            severity: warn
    columns:
      - name: customer_id
        description: Customer identifier (UUID). Primary key of the dimension.
        tests:
          - not_null
          - unique
      - name: name
        description: Customer full name (synthetic).
        tests:
          - not_null
      - name: email
        description: Customer email address (synthetic).
        tests:
          - not_null
      - name: acquisition_channel
        description: Channel through which the customer was acquired.
        tests:
          - not_null
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: account_created_at
        description: Date the customer account was created (UTC).
        tests:
          - not_null
      - name: customer_tenure_days
        description: Whole days from account_created_at to the pipeline run date.
        tests:
          - not_null
      - name: is_active
        description: >
          TRUE when the customer placed at least one order in the trailing 365
          days OR generated at least one event in the trailing 365 days;
          otherwise FALSE.
        tests:
          - not_null
      - name: _run_date
        description: Pipeline run date partition key from audit_columns().
        tests:
          - not_null

  - name: mart_orders
    description: >
      Business-facing order fact table. One row per order carrying the order
      header fields plus the derived line-item metrics item_count and
      avg_item_value_usd. Materialized incrementally (delete+insert on _run_date)
      to refresh the current run date's partition without rebuilding history.
    tests:
      # Recency guard: the mart must carry the current run date's partition.
      # severity warn so a stale mart surfaces without halting the pipeline.
      - dbt_utils.recency:
          datepart: day
          field: _run_date
          interval: 1
          config:
            severity: warn
    columns:
      - name: order_id
        description: >
          Unique order identifier (UUID). Primary key and the unique_key for the
          incremental delete+insert strategy.
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer that placed the order. Foreign key to mart_customers.
        tests:
          - not_null
      - name: order_status
        description: Order lifecycle status (completed, pending, cancelled, refunded).
        tests:
          - not_null
      - name: total_amount_usd
        description: Total order amount in USD (NUMERIC(12,2)).
        tests:
          - not_null
      - name: item_count
        description: Number of line items on the order. Derived; always >= 1.
        tests:
          - not_null
      - name: avg_item_value_usd
        description: >
          Average line-item value in USD (total_amount_usd / item_count),
          cast to NUMERIC(10,2). Non-negative.
        tests:
          - not_null
      - name: ordered_at
        description: UTC timestamp of the order.
        tests:
          - not_null
      - name: _run_date
        description: >
          Pipeline run date partition key from audit_columns(), stamped on every
          row of the current run.
        tests:
          - not_null

  - name: mart_campaigns
    description: >
      Business-facing campaign performance fact table. One row per
      (campaign_id, campaign_date) with spend and engagement metrics, the derived
      click_through_rate, and an anomaly_flag defaulting to FALSE that the
      Anomaly_Model updates when a metric breaches its expected bounds.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - campaign_id
            - campaign_date
      # Recency guard: the mart must carry the current run date's partition.
      # severity warn so a stale mart surfaces without halting the pipeline.
      - dbt_utils.recency:
          datepart: day
          field: _run_date
          interval: 1
          config:
            severity: warn
    columns:
      - name: campaign_id
        description: Campaign identifier (UUID). Part of the composite primary key.
        tests:
          - not_null
      - name: campaign_date
        description: Calendar date (DATE) of the metrics. Part of the composite primary key.
        tests:
          - not_null
      - name: platform
        description: Advertising platform — one of google_ads, meta_ads.
        tests:
          - not_null
          - accepted_values:
              values: ["google_ads", "meta_ads"]
      - name: campaign_name
        description: Human-readable campaign name.
        tests:
          - not_null
      - name: daily_spend_usd
        description: Spend for the campaign on the given day in USD (NUMERIC(12,2)).
        tests:
          - not_null
      - name: impressions
        description: Number of ad impressions on the given day (INTEGER).
        tests:
          - not_null
      - name: clicks
        description: Number of ad clicks on the given day (INTEGER).
        tests:
          - not_null
      - name: click_through_rate
        description: >
          Derived click-through rate — clicks divided by NULLIF(impressions, 0),
          coalesced to 0 and cast to NUMERIC(8,6).
        tests:
          - not_null
      - name: anomaly_flag
        description: >
          Boolean anomaly indicator, defaulting to FALSE. Set to TRUE by the
          Anomaly_Model when the campaign metric deviates beyond expected bounds.
        tests:
          - not_null
      - name: _run_date
        description: Pipeline run date partition key from audit_columns().
        tests:
          - not_null

  - name: mart_support_tickets
    description: >
      Business-facing support ticket fact table. One row per ticket carrying the
      ticket header fields plus the derived resolution_hours, and the NLP
      enrichment columns cluster_id, cluster_label, and cluster_confidence. The
      NLP columns are nullable placeholders populated by the NLP_Processor after
      the daily ticket clustering model runs. Materialized as a full-refresh
      table.
    tests:
      # Recency guard: the mart must carry the current run date's partition.
      # severity warn so a stale mart surfaces without halting the pipeline.
      - dbt_utils.recency:
          datepart: day
          field: _run_date
          interval: 1
          config:
            severity: warn
    columns:
      - name: ticket_id
        description: Unique ticket identifier (UUID). Primary key of the fact table.
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer that opened the ticket. Foreign key to mart_customers.
        tests:
          - not_null
      - name: subject
        description: Short subject line of the ticket.
        tests:
          - not_null
      - name: status
        description: Ticket lifecycle status — one of open, in_progress, closed.
        tests:
          - not_null
          - accepted_values:
              values: ["open", "in_progress", "closed"]
      - name: priority
        description: Ticket priority level — one of low, medium, high.
        tests:
          - not_null
          - accepted_values:
              values: ["low", "medium", "high"]
      - name: created_at
        description: UTC timestamp of ticket creation.
        tests:
          - not_null
      - name: resolved_at
        description: >
          UTC timestamp of ticket resolution; NULL when the ticket is not yet
          resolved.
      - name: resolution_hours
        description: >
          Derived resolution time in hours — (resolved_at - created_at) cast to
          NUMERIC(8,2); NULL when the ticket is unresolved.
      - name: cluster_id
        description: >
          NLP cluster identifier assigned by the NLP_Processor. Nullable; NULL
          until the ticket clustering model has scored the ticket.
      - name: cluster_label
        description: >
          Human-readable 1-10 word NLP cluster label (VARCHAR(200)) derived from
          the cluster's top TF-IDF terms. Nullable until scored.
      - name: cluster_confidence
        description: >
          NLP cluster assignment confidence in [0.00, 1.00] (NUMERIC(5,4)).
          Nullable until scored.
      - name: _run_date
        description: Pipeline run date partition key from audit_columns().
        tests:
          - not_null

  - name: mart_customer_360
    description: >
      Central per-customer feature store — one row per customer — joining the
      enriched customer attributes with order, event, and ticket aggregates. Adds
      RFM quintile scores (computed with NTILE(5) over the active customer
      population), the composite rfm_score string, capped recency_days, trailing
      and all-time order metrics, the order_frequency_trend, run-wide
      active_campaign_count, open_ticket_count, and the is_active flag. Customers
      with no orders in the trailing 365 days are treated as inactive: rfm_score
      'R0F0M0', all RFM dimension scores 0, recency_days 999, is_active FALSE.
      Materialized incrementally (delete+insert on _run_date).
    tests:
      # Recency guard: the mart must carry the current run date's partition.
      # severity warn so a stale mart surfaces without halting the pipeline.
      - dbt_utils.recency:
          datepart: day
          field: _run_date
          interval: 1
          config:
            severity: warn
    columns:
      - name: customer_id
        description: Customer identifier (UUID). Primary key of the feature store.
        tests:
          - not_null
          - unique
      - name: recency_score
        description: >
          RFM recency quintile (0-5). 5 = most recent buyer; 0 = inactive
          customer with no trailing 365-day orders.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5]
      - name: frequency_score
        description: >
          RFM frequency quintile (0-5) over trailing 365-day order count. 5 =
          most frequent; 0 = inactive.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5]
      - name: monetary_score
        description: >
          RFM monetary quintile (0-5) over trailing 365-day spend. 5 = highest
          spend; 0 = inactive.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5]
      - name: rfm_score
        description: >
          Composite RFM string of the form R{r}F{f}M{m} (e.g. R5F3M4). Inactive
          customers receive 'R0F0M0'.
        tests:
          - not_null
      - name: recency_days
        description: >
          Whole days since the customer's most recent order, capped at 999.
          Inactive customers (no orders) are set to 999.
        tests:
          - not_null
      - name: order_frequency_365d
        description: Order count in the trailing 365 days.
        tests:
          - not_null
      - name: total_spend_365d_usd
        description: Total spend in USD in the trailing 365 days (NUMERIC(14,2)).
        tests:
          - not_null
      - name: total_order_count
        description: All-time order count for the customer.
        tests:
          - not_null
      - name: total_spend_usd
        description: All-time spend in USD for the customer (NUMERIC(14,2)).
        tests:
          - not_null
      - name: most_recent_event_date
        description: >
          Date (UTC) of the customer's most recent event; NULL when the customer
          has no events.
      - name: days_since_last_event
        description: >
          Whole days from the most recent event to the run date; NULL when the
          customer has no events.
      - name: days_since_last_order
        description: >
          Whole days from the most recent order to the run date (uncapped); NULL
          when the customer has no orders.
      - name: order_count_last_30d
        description: Order count in the trailing 30 days.
        tests:
          - not_null
      - name: order_count_prior_30d
        description: Order count in the 30 days preceding the trailing 30-day window.
        tests:
          - not_null
      - name: order_frequency_trend
        description: >
          order_count_last_30d minus order_count_prior_30d; positive means
          accelerating order activity.
        tests:
          - not_null
      - name: active_campaign_count
        description: >
          Run-wide count of campaigns with spend in the trailing 30 days. Same
          value on every customer row (cross-joined scalar).
        tests:
          - not_null
      - name: open_ticket_count
        description: Count of the customer's tickets with status open or in_progress.
        tests:
          - not_null
      - name: acquisition_channel
        description: Channel through which the customer was acquired.
        tests:
          - not_null
      - name: customer_tenure_days
        description: Whole days from account_created_at to the pipeline run date.
        tests:
          - not_null
      - name: is_active
        description: >
          TRUE when the customer placed at least one order in the trailing 365
          days; otherwise FALSE.
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: _run_date
        description: >
          Pipeline run date partition key from audit_columns(); the unique_key
          for the incremental delete+insert strategy.
        tests:
          - not_null

  - name: mart_ml_scores
    description: >
      Business-facing ML scores fact table — one row per customer per score_date.
      Promotes the ML pipeline's per-customer scoring output from ml.ml_scores
      (LTV, churn, segmentation, and anomaly results) into the marts layer for API
      and dashboard consumption; it computes no scores itself. Only the current
      run date's partition is promoted each run. Materialized incrementally
      (delete+insert on _run_date). Score bounds are enforced here: churn_score in
      [0.0, 1.0] and ltv_score >= 0.
    tests:
      # Recency guard: the mart must carry the current run date's partition.
      # severity warn so a stale mart surfaces without halting the pipeline.
      - dbt_utils.recency:
          datepart: day
          field: _run_date
          interval: 1
          config:
            severity: warn
    columns:
      - name: customer_id
        description: Customer identifier (UUID). Part of the composite primary key.
        tests:
          - not_null
      - name: score_date
        description: Run date the scores were produced for. Part of the composite primary key.
        tests:
          - not_null
      - name: model_run_id
        description: >
          MLflow run ID of the models that produced this score row, carried
          through for lineage and traceability.
      - name: ltv_score
        description: >
          Predicted 12-month lifetime value in USD (NUMERIC(12,2)). Non-negative
          by contract (LTV_Model clips predictions to a 0.00 minimum).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: churn_score
        description: >
          Churn probability in the closed interval [0.0, 1.0] (NUMERIC(5,4)) —
          the likelihood of no order or event activity in the 90 days following
          the score date.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0.0
              max_value: 1.0
              inclusive: true
      - name: churn_risk_tier
        description: >
          Churn risk tier derived from churn_score — Low (< 0.33),
          Medium ([0.33, 0.67)), or High (>= 0.67).
        tests:
          - not_null
          - accepted_values:
              values: ["Low", "Medium", "High"]
      - name: segment_label
        description: >
          Segmentation cluster label assigned by the Segmentation_Model (e.g.
          Champions, Loyal, At-Risk, Inactive).
        tests:
          - not_null
      - name: anomaly_flag
        description: >
          Boolean anomaly indicator, defaulting to FALSE. Set to TRUE by the
          Anomaly_Model when a metric for this run breaches its expected bounds.
        tests:
          - not_null
      - name: anomaly_detail
        description: >
          JSONB anomaly detail {metric, observed, expected_range, severity};
          NULL when no anomaly applies to the customer.
      - name: scored_at
        description: >
          Timestamp (TIMESTAMPTZ) at which the ML pipeline wrote the underlying
          ml.ml_scores row.
      - name: _run_date
        description: >
          Pipeline run date partition key from audit_columns(); the unique_key
          for the incremental delete+insert strategy.
        tests:
          - not_null
